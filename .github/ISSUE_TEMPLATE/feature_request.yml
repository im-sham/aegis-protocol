name: Feature request
description: Suggest an improvement or integration.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or user need does this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: input
    id: component
    attributes:
      label: Component
      placeholder: contracts, sdk, mcp, api, subgraph, docs
    validations:
      required: false
