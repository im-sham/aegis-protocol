name: Bug report
description: Report a reproducible issue in AEGIS.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Steps, commands, inputs, and observed output.
    validations:
      required: true
  - type: input
    id: component
    attributes:
      label: Component
      placeholder: contracts, sdk, mcp, api, subgraph, docs
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Chain, package versions, Node/Foundry versions, or other relevant context.
    validations:
      required: false
